name: Deploy MergePDF to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Loading NVM environment ==="
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "=== Starting MergePDF Deployment ==="

            # 1. Clone repository if not present
            if [ ! -d "/var/www/mergepdf" ]; then
              git clone https://github.com/sidAli1993/mergepdf.git /var/www/mergepdf
            fi

            cd /var/www/mergepdf

            # 2. Pull latest code
            git fetch --all
            git reset --hard origin/main

            # 3. Install & Build
            npm ci --production=false
            npm run build

            # 4. Set port configuration
            echo "PORT=3001" > .env

            # 5. PM2 - restart or start the app
            if pm2 list | grep -q "mergepdf"; then
              pm2 restart mergepdf
            else
              PORT=3001 pm2 start npm --name "mergepdf" -- start
            fi
            pm2 save

            # 6. SSL via Certbot (skip if cert already valid)
            CERT_PATH="/etc/letsencrypt/live/mergepdf.mydigitsign.com/fullchain.pem"
            if [ ! -f "$CERT_PATH" ]; then
              echo "Requesting SSL certificate via Certbot standalone..."
              command -v certbot || (apt-get update -qq && apt-get install -y certbot)
              systemctl stop nginx || true
              certbot certonly --standalone \
                -d mergepdf.mydigitsign.com \
                --non-interactive --agree-tos \
                --email webmaster@mydigitsign.com
              systemctl start nginx || true
            else
              echo "SSL certificate already exists. Skipping Certbot."
            fi

            # 7. DIAGNOSTIC: Show all active Nginx includes for this domain
            echo ""
            echo "=== NGINX DIAGNOSTIC ==="
            echo "--- Active includes from nginx.conf ---"
            grep "include" /etc/nginx/nginx.conf || true
            echo ""
            echo "--- All server_name matches for mergepdf.mydigitsign.com ---"
            grep -rn "mergepdf.mydigitsign.com" /etc/nginx/ /home/isa_cpanel/conf/ 2>/dev/null || true
            echo ""
            echo "--- HestiaCP conf dir listing ---"
            ls -la /home/isa_cpanel/conf/web/mergepdf.mydigitsign.com/ 2>/dev/null || echo "dir not found"
            echo ""
            echo "--- HestiaCP nginx.conf content ---"
            cat /home/isa_cpanel/conf/web/mergepdf.mydigitsign.com/nginx.conf 2>/dev/null || echo "file not found"
            echo ""
            echo "--- Our conf.d/mergepdf.conf ---"
            cat /etc/nginx/conf.d/mergepdf.conf 2>/dev/null || echo "file not found"
            echo "=== END DIAGNOSTIC ==="
            echo ""

            # 8. Write the definitive Nginx config to conf.d
            echo "Writing Nginx proxy configuration..."
            cat > /etc/nginx/conf.d/mergepdf.conf << 'NGINXEOF'
            server {
                listen 80;
                server_name mergepdf.mydigitsign.com;
                location /.well-known/acme-challenge/ {
                    root /var/www/certbot;
                }
                location / {
                    return 301 https://$host$request_uri;
                }
            }
            server {
                listen 443 ssl;
                http2 on;
                server_name mergepdf.mydigitsign.com;
                ssl_certificate     /etc/letsencrypt/live/mergepdf.mydigitsign.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/mergepdf.mydigitsign.com/privkey.pem;
                ssl_protocols       TLSv1.2 TLSv1.3;
                ssl_ciphers         HIGH:!aNULL:!MD5;
                location / {
                    proxy_pass          http://127.0.0.1:3001;
                    proxy_http_version  1.1;
                    proxy_set_header    Upgrade $http_upgrade;
                    proxy_set_header    Connection "upgrade";
                    proxy_set_header    Host $host;
                    proxy_set_header    X-Real-IP $remote_addr;
                    proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header    X-Forwarded-Proto $scheme;
                    proxy_cache_bypass  $http_upgrade;
                    proxy_read_timeout  60s;
                }
            }
            NGINXEOF

            # 9. Neutralize HestiaCP include files for this domain (prevent duplicate blocks)
            HESTIA_CONF="/home/isa_cpanel/conf/web/mergepdf.mydigitsign.com"
            if [ -d "$HESTIA_CONF" ]; then
              echo "Neutralizing HestiaCP include files..."
              echo "# proxy handled by /etc/nginx/conf.d/mergepdf.conf" > $HESTIA_CONF/nginx.conf
              echo "# proxy handled by /etc/nginx/conf.d/mergepdf.conf" > $HESTIA_CONF/nginx.ssl.conf
              # Also check for and remove any .conf_backup or .conf_default HestiaCP files
              rm -f $HESTIA_CONF/nginx.conf_backup 2>/dev/null || true
            fi

            # 10. Test and reload Nginx
            echo "Testing Nginx configuration..."
            nginx -t
            echo "Reloading Nginx..."
            systemctl reload nginx || service nginx reload

            echo ""
            echo "=== MergePDF Deployment Complete! ==="
            echo "=== Site: https://mergepdf.mydigitsign.com ==="
