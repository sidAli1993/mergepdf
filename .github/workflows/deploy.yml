name: Deploy MergePDF to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Loading NVM environment ==="
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            echo "=== Starting MergePDF Deployment ==="

            # 1. Clone repository if not present
            if [ ! -d "/var/www/mergepdf" ]; then
              echo "Cloning repository..."
              git clone https://github.com/sidAli1993/mergepdf.git /var/www/mergepdf
            fi

            cd /var/www/mergepdf
            
            # 2. Pull code
            git fetch --all
            git reset --hard origin/main

            # 3. Build & Install
            npm ci --production=false
            npm run build

            # 4. Set port configuration
            echo "PORT=3001" > .env

            # 5. PM2 deployment
            pm2 delete mergepdf 2>/dev/null || true
            PORT=3001 pm2 start npm --name "mergepdf" -- start
            pm2 save

            # 6. HestiaCP Web Domain & SSL Integration
            HESTIA_CLI="/usr/local/hestia/bin"
            if [ -d "$HESTIA_CLI" ]; then
              echo "HestiaCP detected. Registering domain and setting up SSL..."
              
              # Add web domain to user 'isa_cpanel' if not present
              $HESTIA_CLI/v-add-web-domain isa_cpanel mergepdf.mydigitsign.com || true
              
              # Request Let's Encrypt SSL certificate
              $HESTIA_CLI/v-add-web-domain-ssl isa_cpanel mergepdf.mydigitsign.com yes || true
              
              # Write custom proxy configuration to Nginx files managed by HestiaCP
              CONF_DIR="/home/isa_cpanel/conf/web/mergepdf.mydigitsign.com"
              if [ -d "$CONF_DIR" ]; then
                echo "Writing Nginx proxy templates to HestiaCP configurations..."
                                # Standard HTTP Proxy
                 echo 'server {' > $CONF_DIR/nginx.conf
                 echo '    listen      80;' >> $CONF_DIR/nginx.conf
                 echo '    server_name mergepdf.mydigitsign.com;' >> $CONF_DIR/nginx.conf
                 echo '    return 301 https://$host$request_uri;' >> $CONF_DIR/nginx.conf
                 echo '}' >> $CONF_DIR/nginx.conf

                 # Secured HTTPS Proxy
                 echo 'server {' > $CONF_DIR/nginx.ssl.conf
                 echo '    listen      443 ssl http2;' >> $CONF_DIR/nginx.ssl.conf
                 echo '    server_name mergepdf.mydigitsign.com;' >> $CONF_DIR/nginx.ssl.conf
                 echo '    ssl_certificate      /home/isa_cpanel/conf/web/mergepdf.mydigitsign.com/ssl.mergepdf.mydigitsign.com.pem;' >> $CONF_DIR/nginx.ssl.conf
                 echo '    ssl_certificate_key  /home/isa_cpanel/conf/web/mergepdf.mydigitsign.com/ssl.mergepdf.mydigitsign.com.key;' >> $CONF_DIR/nginx.ssl.conf
                 echo '    location / {' >> $CONF_DIR/nginx.ssl.conf
                 echo '        proxy_pass      http://localhost:3001;' >> $CONF_DIR/nginx.ssl.conf
                 echo '        proxy_redirect  off;' >> $CONF_DIR/nginx.ssl.conf
                 echo '        proxy_set_header Host $host;' >> $CONF_DIR/nginx.ssl.conf
                 echo '        proxy_set_header X-Real-IP $remote_addr;' >> $CONF_DIR/nginx.ssl.conf
                 echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' >> $CONF_DIR/nginx.ssl.conf
                 echo '        proxy_set_header X-Forwarded-Proto $scheme;' >> $CONF_DIR/nginx.ssl.conf
                 echo '        proxy_http_version 1.1;' >> $CONF_DIR/nginx.ssl.conf
                 echo '        proxy_set_header Upgrade $http_upgrade;' >> $CONF_DIR/nginx.ssl.conf
                 echo '        proxy_set_header Connection "upgrade";' >> $CONF_DIR/nginx.ssl.conf
                 echo '        proxy_cache_bypass $http_upgrade;' >> $CONF_DIR/nginx.ssl.conf
                 echo '    }' >> $CONF_DIR/nginx.ssl.conf
                 echo '}' >> $CONF_DIR/nginx.ssl.conf
               fi
              
              # Test Nginx and reload
              nginx -t
              systemctl reload nginx || service nginx reload
            else
              # Fallback for standalone Nginx without HestiaCP
              if [ ! -f "/etc/nginx/conf.d/mergepdf.conf" ] && [ ! -f "/etc/nginx/sites-available/mergepdf" ]; then
                echo "Standalone Nginx configuration..."
                NGINX_CONF="server {
                    listen 80;
                    server_name mergepdf.mydigitsign.com;
                    location / {
                        proxy_pass http://localhost:3001;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade \$http_upgrade;
                        proxy_set_header Connection 'upgrade';
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                        proxy_set_header X-Forwarded-Proto \$scheme;
                        proxy_cache_bypass \$http_upgrade;
                        proxy_read_timeout 60s;
                    }
                }"
                if [ -d "/etc/nginx/sites-available" ]; then
                  echo "$NGINX_CONF" > /etc/nginx/sites-available/mergepdf
                  ln -sf /etc/nginx/sites-available/mergepdf /etc/nginx/sites-enabled/mergepdf
                elif [ -d "/etc/nginx/conf.d" ]; then
                  echo "$NGINX_CONF" > /etc/nginx/conf.d/mergepdf.conf
                fi
                nginx -t
                systemctl reload nginx || service nginx reload
              fi
            fi

            echo "=== Deployment Complete! ==="
