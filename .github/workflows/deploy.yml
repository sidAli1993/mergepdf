name: Deploy MergePDF to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Loading NVM environment ==="
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            echo "=== Starting MergePDF Deployment ==="

            # 1. Clone repository if not present
            if [ ! -d "/var/www/mergepdf" ]; then
              echo "Cloning repository..."
              git clone https://github.com/sidAli1993/mergepdf.git /var/www/mergepdf
            fi

            cd /var/www/mergepdf
            
            # 2. Pull code
            git fetch --all
            git reset --hard origin/main

            # 3. Build & Install
            npm ci --production=false
            npm run build

            # 4. Set port configuration
            echo "PORT=3001" > .env

            # 5. PM2 deployment
            pm2 delete mergepdf 2>/dev/null || true
            PORT=3001 pm2 start npm --name "mergepdf" -- start
            pm2 save

            # 6. Configure Nginx Virtual Host if missing
            if [ ! -f "/etc/nginx/sites-available/mergepdf" ]; then
              echo "Configuring Nginx Virtual Host..."
              NGINX_CONF="server {
                  listen 80;
                  server_name mergepdf.mydigitsign.com;
                  location / {
                      proxy_pass http://localhost:3001;
                      proxy_http_version 1.1;
                      proxy_set_header Upgrade \$http_upgrade;
                      proxy_set_header Connection 'upgrade';
                      proxy_set_header Host \$host;
                      proxy_set_header X-Real-IP \$remote_addr;
                      proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto \$scheme;
                      proxy_cache_bypass \$http_upgrade;
                      proxy_read_timeout 60s;
                  }
              }"
              echo "$NGINX_CONF" > /etc/nginx/sites-available/mergepdf
              ln -sf /etc/nginx/sites-available/mergepdf /etc/nginx/sites-enabled/mergepdf
              nginx -t
              systemctl reload nginx
            fi

            echo "=== Deployment Complete! ==="
