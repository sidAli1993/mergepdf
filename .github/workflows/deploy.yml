name: Deploy MergePDF to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Loading NVM environment ==="
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "=== Starting MergePDF Deployment ==="

            # 1. Clone repository if not present
            if [ ! -d "/var/www/mergepdf" ]; then
              echo "Cloning repository..."
              git clone https://github.com/sidAli1993/mergepdf.git /var/www/mergepdf
            fi

            cd /var/www/mergepdf

            # 2. Pull latest code
            git fetch --all
            git reset --hard origin/main

            # 3. Install & Build
            npm ci --production=false
            npm run build

            # 4. Set port configuration
            echo "PORT=3001" > .env

            # 5. PM2 - restart or start the app
            if pm2 list | grep -q "mergepdf"; then
              pm2 restart mergepdf
            else
              PORT=3001 pm2 start npm --name "mergepdf" -- start
            fi
            pm2 save

            # 6. SSL + Nginx proxy via Certbot (only if cert doesn't already exist)
            CERT_PATH="/etc/letsencrypt/live/mergepdf.mydigitsign.com/fullchain.pem"
            if [ ! -f "$CERT_PATH" ]; then
              echo "SSL certificate not found. Requesting via Certbot standalone..."
              if ! command -v certbot &> /dev/null; then
                apt-get update -qq && apt-get install -y certbot
              fi
              # Stop Nginx briefly to free port 80
              systemctl stop nginx || true
              certbot certonly --standalone \
                -d mergepdf.mydigitsign.com \
                --non-interactive \
                --agree-tos \
                --email webmaster@mydigitsign.com
              # Restart Nginx
              systemctl start nginx || true
              echo "SSL certificate obtained successfully."
            else
              echo "SSL certificate already exists. Skipping Certbot."
            fi

            # 7. Write the Nginx configuration directly (not via HestiaCP)
            #    We write to /etc/nginx/conf.d/ to avoid conflict with HestiaCP's per-domain conf.
            #    This is the ONLY config block for this subdomain.
            echo "Writing Nginx proxy configuration for mergepdf.mydigitsign.com..."
            cat > /etc/nginx/conf.d/mergepdf.conf << 'NGINXEOF'
            # MergePDF - HTTP to HTTPS redirect
            server {
                listen 80;
                server_name mergepdf.mydigitsign.com;

                # Allow Let's Encrypt ACME challenges
                location /.well-known/acme-challenge/ {
                    root /var/www/certbot;
                }

                # Redirect all HTTP to HTTPS
                location / {
                    return 301 https://$host$request_uri;
                }
            }

            # MergePDF - HTTPS proxy to Next.js on port 3001
            server {
                listen 443 ssl http2;
                server_name mergepdf.mydigitsign.com;

                ssl_certificate     /etc/letsencrypt/live/mergepdf.mydigitsign.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/mergepdf.mydigitsign.com/privkey.pem;
                ssl_protocols       TLSv1.2 TLSv1.3;
                ssl_ciphers         HIGH:!aNULL:!MD5;

                location / {
                    proxy_pass          http://127.0.0.1:3001;
                    proxy_http_version  1.1;
                    proxy_set_header    Upgrade $http_upgrade;
                    proxy_set_header    Connection "upgrade";
                    proxy_set_header    Host $host;
                    proxy_set_header    X-Real-IP $remote_addr;
                    proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header    X-Forwarded-Proto $scheme;
                    proxy_cache_bypass  $http_upgrade;
                    proxy_read_timeout  60s;
                }
            }
            NGINXEOF

            # 8. Remove any HestiaCP-managed blocks for this domain from nginx.conf
            #    to avoid duplicate server_name conflicts on port 80/443
            HESTIA_CONF="/home/isa_cpanel/conf/web/mergepdf.mydigitsign.com"
            if [ -d "$HESTIA_CONF" ]; then
              echo "Disabling HestiaCP nginx includes for this domain to prevent conflicts..."
              # Replace HestiaCP's nginx.conf with a comment-only file (no active server blocks)
              echo "# Managed by deploy pipeline - proxy handled in /etc/nginx/conf.d/mergepdf.conf" > $HESTIA_CONF/nginx.conf
              echo "# Managed by deploy pipeline - proxy handled in /etc/nginx/conf.d/mergepdf.conf" > $HESTIA_CONF/nginx.ssl.conf
            fi

            # 9. Test and reload Nginx
            echo "Testing Nginx configuration..."
            nginx -t
            echo "Reloading Nginx..."
            systemctl reload nginx || service nginx reload

            echo ""
            echo "=== MergePDF Deployment Complete! ==="
            echo "=== App running on https://mergepdf.mydigitsign.com ==="
