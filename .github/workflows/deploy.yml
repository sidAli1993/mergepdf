name: Deploy MergePDF to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Loading NVM environment ==="
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "=== Starting MergePDF Deployment ==="

            # 1. Clone repository if not present
            if [ ! -d "/var/www/mergepdf" ]; then
              git clone https://github.com/sidAli1993/mergepdf.git /var/www/mergepdf
            fi

            cd /var/www/mergepdf

            # 2. Pull latest code
            git fetch --all
            git reset --hard origin/main

            # 3. Install & Build
            npm ci --production=false
            npm run build

            # 4. Set port configuration
            echo "PORT=3001" > .env

            # 5. PM2 - restart or start the app
            if pm2 list | grep -q "mergepdf"; then
              pm2 restart mergepdf
            else
              PORT=3001 pm2 start npm --name "mergepdf" -- start
            fi
            pm2 save

            # 6. SSL via Certbot (skip if cert already valid)
            CERT_PATH="/etc/letsencrypt/live/mergepdf.mydigitsign.com/fullchain.pem"
            if [ ! -f "$CERT_PATH" ]; then
              echo "Requesting SSL certificate via Certbot standalone..."
              command -v certbot || (apt-get update -qq && apt-get install -y certbot)
              systemctl stop nginx || true
              certbot certonly --standalone \
                -d mergepdf.mydigitsign.com \
                --non-interactive --agree-tos \
                --email webmaster@mydigitsign.com
              systemctl start nginx || true
            else
              echo "SSL certificate already exists. Skipping Certbot."
            fi

            # 7. DIAGNOSTIC: Show all Nginx domain configs
            echo "=== Checking /etc/nginx/conf.d/domains/ ==="
            ls -la /etc/nginx/conf.d/domains/ 2>/dev/null | grep -i mergepdf || echo "No mergepdf file in domains/"
            echo "Content of domains/mergepdf conf if it exists:"
            cat /etc/nginx/conf.d/domains/mergepdf.mydigitsign.com.conf 2>/dev/null || echo "Not found"
            echo "Content of nginx.conf_letsencrypt:"
            cat /home/isa_cpanel/conf/web/mergepdf.mydigitsign.com/nginx.conf_letsencrypt 2>/dev/null || echo "Not found"
            echo "==========================="

            # 8. Write proxy config — MUST break symlink first or step 10 will overwrite it
            echo "Breaking symlink and writing real proxy config to domains directory..."
            rm -f /etc/nginx/conf.d/domains/mergepdf.mydigitsign.com.conf
            cat > /etc/nginx/conf.d/domains/mergepdf.mydigitsign.com.conf << 'NGINXEOF'
            server {
                listen 80;
                server_name mergepdf.mydigitsign.com;
                location /.well-known/acme-challenge/ {
                    root /home/isa_cpanel/web/mergepdf.mydigitsign.com/public_html;
                }
                location / {
                    return 301 https://$host$request_uri;
                }
            }
            server {
                listen 443 ssl;
                http2 on;
                server_name mergepdf.mydigitsign.com;
                ssl_certificate     /etc/letsencrypt/live/mergepdf.mydigitsign.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/mergepdf.mydigitsign.com/privkey.pem;
                ssl_protocols       TLSv1.2 TLSv1.3;
                ssl_ciphers         HIGH:!aNULL:!MD5;
                location / {
                    proxy_pass          http://127.0.0.1:3001;
                    proxy_http_version  1.1;
                    proxy_set_header    Upgrade $http_upgrade;
                    proxy_set_header    Connection "upgrade";
                    proxy_set_header    Host $host;
                    proxy_set_header    X-Real-IP $remote_addr;
                    proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header    X-Forwarded-Proto $scheme;
                    proxy_cache_bypass  $http_upgrade;
                    proxy_read_timeout  60s;
                }
            }
            NGINXEOF

            # 9. Also remove the old conf.d/mergepdf.conf to avoid conflicts
            rm -f /etc/nginx/conf.d/mergepdf.conf || true

            # 10. Neutralize HestiaCP include files for this domain
            HESTIA_CONF="/home/isa_cpanel/conf/web/mergepdf.mydigitsign.com"
            if [ -d "$HESTIA_CONF" ]; then
              echo "Neutralizing HestiaCP include files..."
              echo "# proxy handled by /etc/nginx/conf.d/domains/mergepdf.mydigitsign.com.conf" > $HESTIA_CONF/nginx.conf
              echo "# proxy handled by /etc/nginx/conf.d/domains/mergepdf.mydigitsign.com.conf" > $HESTIA_CONF/nginx.ssl.conf
              # Neutralize letsencrypt symlink file too (it adds another server block)
              echo "# proxy handled by pipeline" > $HESTIA_CONF/nginx.conf_letsencrypt || true
            fi

            # 10. Test and reload Nginx
            echo "Testing Nginx configuration..."
            nginx -t
            echo "Reloading Nginx..."
            systemctl reload nginx || service nginx reload

            echo ""
            echo "=== MergePDF Deployment Complete! ==="
            echo "=== Site: https://mergepdf.mydigitsign.com ==="
