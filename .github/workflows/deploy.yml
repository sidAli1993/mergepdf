name: Deploy MergePDF to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Loading NVM environment ==="
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            echo "=== Starting MergePDF Deployment ==="

            # 1. Clone repository if not present
            if [ ! -d "/var/www/mergepdf" ]; then
              echo "Cloning repository..."
              git clone https://github.com/sidAli1993/mergepdf.git /var/www/mergepdf
            fi

            cd /var/www/mergepdf
            
            # 2. Pull code
            git fetch --all
            git reset --hard origin/main

            # 3. Build & Install
            npm ci --production=false
            npm run build

            # 4. Set port configuration
            echo "PORT=3001" > .env

            # 5. PM2 deployment
            pm2 delete mergepdf 2>/dev/null || true
            PORT=3001 pm2 start npm --name "mergepdf" -- start
            pm2 save

            # 6. HestiaCP Web Domain & SSL Integration
            HESTIA_CLI="/usr/local/hestia/bin"
            if [ -d "$HESTIA_CLI" ]; then
              echo "HestiaCP detected. Listing available HestiaCP SSL commands..."
              ls -la $HESTIA_CLI | grep -E "ssl|letsencrypt" || true
            fi

            echo "=== Deployment Complete! ==="
